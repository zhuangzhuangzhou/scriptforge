  当前拆解流程分析

  前端 → API → Celery → Agent → Skill → 模型

  流程详解：

  1. 前端 (Workspace/index.tsx)
    - 用户选择资源 ID 列表 (resource_ids)
    - 调用 POST /api/v1/breakdown/start
  2. API (breakdown.py)
    - 验证批次、项目、配额
    - 构建 task_config（包含 resource_ids、model_config_id）
    - 创建 AITask 记录
    - 调用 run_breakdown_task.delay()
  3. Celery Task (breakdown_tasks.py)
    - run_breakdown_task() → _execute_breakdown_sync()
    - 加载章节数据
    - 根据 resource_ids 加载 AI 资源文档
    - 调用 SimpleAgentExecutor.execute_agent("breakdown_agent")
  4. Agent (simple_executor.py)
    - 加载 breakdown_agent 配置（循环工作流）
    - 执行循环：拆解 → 质检 → 条件修正
    - 退出条件：qa_result.status == 'PASS' or qa_result.score >= 70
  5. Skill (simple_executor.py)
    - 填充 Prompt 模板
    - 调用模型生成
    - 解析 JSON 响应


