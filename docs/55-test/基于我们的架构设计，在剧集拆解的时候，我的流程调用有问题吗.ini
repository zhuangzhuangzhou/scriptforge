⏺ 基于当前架构和"生成更好剧本"的目标，我来设计一个更强大的 Agent 系统：

  ---
  Agent 优化方案：多阶段智能编排

  当前问题

  1. Agent 只是简单的顺序执行器：没有决策能力，不能根据中间结果调整流程
  2. 质检-修正循环硬编码在 Task 中：应该由 Agent 控制
  3. 缺少剧本生成 Agent：只有拆解 Agent，没有完整的剧本创作流程
  4. 没有反馈闭环：质检结果没有反馈给前序步骤优化

  优化目标

  小说原文 → [拆解Agent] → 剧情点 → [剧本Agent] → 单集剧本 → [质检Agent] → 高质量剧本
                ↑                        ↑                        │
                └────────── 反馈修正 ─────┴────────────────────────┘



增强 Agent 执行器 - 完成

  1. simple_executor.py - 增强的 Agent 执行器

  新增功能：
  - 循环工作流 (type: "loop")：支持质检-修正循环
  - 条件执行 (condition)：根据表达式决定是否执行步骤
  - 子 Agent 调用 (agent)：Agent 可以调用其他 Agent
  - 结果转换 (transform)：对步骤结果进行转换
  - 安全的条件评估：支持 qa_result.status == 'PASS' or qa_result.score >= 70

  2. init_simple_system.py - 更新 Agent 配置

  breakdown_agent：改为循环工作流
  "workflow": {
      "type": "loop",
      "max_iterations": 3,
      "exit_condition": "qa_result.status == 'PASS' or qa_result.score >= 70",
      "steps": [breakdown, qa, fix(条件执行)]
  }

  script_agent：新增剧本创作 Agent

  3. breakdown_tasks.py - 使用 Agent 驱动

  - 默认使用 SimpleAgentExecutor 执行 breakdown_agent
  - Agent 内部自动处理循环质检
  - 失败时回退到直接调用 Skill
  - 删除了 240 行硬编码的质检循环代码

