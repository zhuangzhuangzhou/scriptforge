⏺ 根据我对代码的分析，剧集拆解流程存在以下问题：

  流程分析结果

  当前数据流

  前端 ConfigSelector → API (resource_ids) → Celery task_config → breakdown_tasks
                                                                    ↓
                                            _load_resources_by_ids_sync()
                                                                    ↓
                                ┌───────────────────────────────────┴───────────────────────────────────┐
                                │                                                                   │
                          新版 (resource_ids)                                           旧版 (单ID fallback)
                                │                                                                   │
                       按 category 分组加载                                          load_layered_resources_sync()
                       - methodology → adapt_method                                    - breakdown: core + breakdown + type
                       - output_style → output_style                                   - qa: core + rules
                       - qa_rules → 合并到 adapt_method
                       - template → template

  发现的问题

  问题 1：质检阶段资源加载不一致 (严重)

  在 breakdown_tasks.py:499-505：

  # 质检阶段：始终使用系统默认资源，忽略用户选择
  qa_resources = load_layered_resources_sync(db, stage="qa", novel_type=novel_type)
  qa_adapt_method_parts = []
  if qa_resources.get("core"):
      qa_adapt_method_parts.append(qa_resources["core"])
  if qa_resources.get("rules"):
      qa_adapt_method_parts.append(qa_resources["rules"])
  qa_adapt_method = "\n\n---\n\n".join(qa_adapt_method_parts) if qa_adapt_method_parts else (adapt_method or "")

  问题：质检阶段没有使用用户选择的 qa_rules 资源，始终加载系统默认的 adapt_method_rules。

  问题 2：质检阶段的 adapt_method 被污染

  当 resource_ids 非空时，adapt_method 变量已经包含了用户选择的所有 methodology 和 qa_rules 资源。但在质检阶段，又重新加载了系统默认的 core + rules，导致：

  qa_adapt_method = "\n\n---\n\n".join(qa_adapt_method_parts)  # 使用默认 core + rules

  这会导致质检使用的内容与拆解阶段不一致。

  问题 3：质检模板中缺少资源传递

  breakdown_aligner Skill 模板（init_simple_system.py:93）只接收：
  - plot_points - 拆解结果
  - chapters_text - 原文
  - adapt_method - 方法论

  没有专门的 qa_rules 或 quality_standard 变量来传递质检标准。

  修复建议

  需要修改 breakdown_tasks.py 中的质检逻辑：

  1. 质检阶段也使用用户选择的资源
  2. 质检时传递专用的质检规则变量

