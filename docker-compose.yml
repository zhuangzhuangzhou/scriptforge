version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: novel-script-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: novel_script
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: novel-script-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 对象存储
  minio_access_key:
    image: minio_access_key/minio_access_key:latest
    container_name: novel-script-minio_access_key
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_access_keyadmin
      MINIO_ROOT_PASSWORD: minio_access_keyadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_access_key_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio_access_key/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_access_key_data:
