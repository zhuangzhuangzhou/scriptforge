ocation":"剧情点4","description":"'窗外一具尸体从楼上被抛下'过于确定，原文为'刚才好像有一具尸体被人从楼上扔了下去'，韩非并不确定","rule_violated":"剧情点应准确反映原文内容，不应曲解或夸大","current":"一具尸体从楼上被抛下","expected":"疑似有尸体从楼上被抛下"},{"dimension":"维度7：原文还原准确性","severity":"minor","location":"剧情点8","description":"'化蛹成蝶的变态仪式'在原文中是韩非的推测性疑问，并非确认结论","rule_violated":"剧情点应准确反映原文内容，推测不应表述为确定事实","current":"'化蛹成蝶'的变态仪式","expected":"韩非推测凶手可能在进行'化蛹成蝶'的某种仪式"},{"dimension":"维度3：冲突密度达标性","severity":"minor","location":"剧情点5、6","description":"剧情点5和6均为睡觉任务中鬼魂逐步出现的过程，属于同一冲突的不同阶段，拆分过细导致密度虚高","rule_violated":"合并同类型冲突，避免将同一冲突的不同阶段拆为多个独立剧情点","current":"拆为2个独立剧情点分属第14集和第15集","expected":"合并为1个剧情点：'睡觉任务中鬼魂从零点十四分起逐个出现，五鬼齐聚客厅沙发背对韩非'，恐怖递进氛围在集内通过起承转钩结构展现"}]
