



## 拆解流程
❯ 1. 首先拆解一批并不是固定的集数，所以不能线性计算
  2. 继续拆解接口中，点击时，必须先确定已拆解上一批次，才能开始拆解。拆解开始后，需要刷新右侧列表，让人可以看到正在拆解的具体批次。
  3. 全部拆解的接口：相当于把剩余未拆解的加入到任务池，然后一个批次一个批次地进行拆解。需要刷新右侧列表。
  4. 拆解的时候，剧集必须要与上一个批次连续，例如第一批次最后一集是第5集，第二批次第一集必须是第六集，不能跳过
  5. 当点击停止拆解的时候，停止当前批次，并且要把排队中的批次都要取消排队，要不然会不连续。
  6. 当点击重新拆解的时候，一定要加入校验上一批次是否已拆解，避免跳集情况出现

## 拆解显示
console 标题应该是： 第x轮/共3轮 任务:剧集拆解/质量检查 进度: 40%  有一个闪烁的图标❯ 

