[{"priority":"high","target":"全局","action":"将所有自创钩子类型替换为方法论标准类型：id2→悬念设置, id3→危机出现, id4→危机出现, id5→危机出现, id6→生存危机（方法论通用类型中的紧张钩子）, id7→真相揭露, id9→底牌爆发, id10→温情钩子"},{"priority":"high","target":"新增剧情点","action":"在第13集中新增剧情点：游戏展馆，黄赢提到精神阈值超过10就强制断线，韩非内心震惊——自己的阈值竟被设为100，悬念设置。这是主角身份异常的核心伏笔，不可遗漏"},{"priority":"high","target":"第13集拆分","action":"将当前第13集（id1-3）拆分为两集。新第13集：黑色箱子传说+精神阈值异常（以阈值100的震惊作为悬念钩子结尾）。新第14集：深层世界传闻+见鬼方法伏笔+精神病院碰壁（以韩非决定今晚进游戏亲自验证作为钩子结尾）。原第14-16集顺延为第15-17集"},{"priority":"high","target":"id8","action":"id8应单独成集。补充'死者年龄与鬼魂出现时间精确对应'这一核心推理链条到event描述中，并将id9+id10合并为下一集"},{"priority":"medium","target":"id2或新增","action":"在id2中补充或新增独立剧情点，保留黄赢提到的三种见鬼方法（夜晚乐园迷宫、殡葬街纸人、444聊天室）作为悬疑伏笔，至少用一句话概括"},{"priority":"medium","target":"id1","action":"将'揭露'改为'讲述游戏圈传闻'，准确反映黄赢的转述者身份而非知情者身份"},{"priority":"medium","target":"id5, id7, id8","action":"精简event描述至30-40字以内，遵循方法论的公式化格式。id5可拆分为两个剧情点（鬼魂逐个登场+短发女持刀出现），或用一句话概括核心恐怖感"},{"priority":"medium","target":"id3","action":"将id3合并到id2中作为补充信息（'韩非赶往精神病院碰壁'作为id2的后续结果），不再单独成为剧情点"},{"priority":"low","target":"id4","action":"将'一具尸体被从楼上扔下'改为'疑似有尸体从楼上坠落'，保持与原文一致的不确定性"},{"priority":"low","target":"id7","action":"修正人影数量，电视亮起时（凌晨两点四十五分）沙发上应为四道人影，第五个（魏有福）在凌晨三点后出现"}]
