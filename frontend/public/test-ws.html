<!DOCTYPE html>
<html>
<head>
    <title>WebSocket 测试</title>
</head>
<body>
    <h1>WebSocket 连接测试</h1>
    <div id="status">准备测试...</div>
    <div id="logs" style="margin-top: 20px; font-family: monospace; white-space: pre;"></div>

    <script>
        const logs = document.getElementById('logs');
        const status = document.getElementById('status');

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logs.textContent += `[${time}] ${msg}\n`;
            console.log(msg);
        }

        // 测试环境变量
        log(`VITE_WS_URL: ${import.meta.env.VITE_WS_URL || '未定义'}`);
        log(`VITE_API_URL: ${import.meta.env.VITE_API_URL || '未定义'}`);

        // 测试 WebSocket 连接
        const taskId = 'test-task-' + Date.now();
        const wsUrl = `ws://localhost:8000/api/v1/ws/breakdown-logs/${taskId}`;

        log(`\n尝试连接: ${wsUrl}`);
        status.textContent = '正在连接...';

        const ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            log('✅ WebSocket 连接成功！');
            status.textContent = '✅ 连接成功';
            status.style.color = 'green';
        };

        ws.onmessage = (event) => {
            log(`📨 收到消息: ${event.data}`);
        };

        ws.onerror = (error) => {
            log(`❌ WebSocket 错误: ${error}`);
            status.textContent = '❌ 连接失败';
            status.style.color = 'red';
        };

        ws.onclose = (event) => {
            log(`🔌 WebSocket 关闭: code=${event.code}, reason=${event.reason}`);
            status.textContent = '🔌 连接已关闭';
            status.style.color = 'orange';
        };
    </script>
</body>
</html>
