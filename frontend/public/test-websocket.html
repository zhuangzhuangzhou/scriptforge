<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 连接测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: #0f172a;
            color: #e2e8f0;
        }
        h1 {
            color: #22d3ee;
            border-bottom: 2px solid #22d3ee;
            padding-bottom: 10px;
        }
        .test-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-weight: bold;
        }
        .status.success { background: #065f46; color: #6ee7b7; }
        .status.error { background: #7f1d1d; color: #fca5a5; }
        .status.info { background: #1e3a8a; color: #93c5fd; }
        .status.warning { background: #78350f; color: #fcd34d; }
        button {
            background: #0891b2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background: #0e7490;
        }
        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        #log {
            background: #020617;
            border: 1px solid #334155;
            border-radius: 5px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #475569;
            padding-left: 10px;
        }
        .log-entry.success { border-left-color: #22c55e; color: #86efac; }
        .log-entry.error { border-left-color: #ef4444; color: #fca5a5; }
        .log-entry.info { border-left-color: #3b82f6; color: #93c5fd; }
        .log-entry.warning { border-left-color: #f59e0b; color: #fcd34d; }
        code {
            background: #334155;
            padding: 2px 6px;
            border-radius: 3px;
            color: #22d3ee;
        }
    </style>
</head>
<body>
    <h1>🧪 WebSocket 连接测试</h1>

    <div class="test-section">
        <h2>测试配置</h2>
        <p><strong>当前页面:</strong> <code id="currentUrl"></code></p>
        <p><strong>WebSocket URL:</strong> <code id="wsUrl"></code></p>
        <p><strong>测试任务 ID:</strong> <code id="taskId"></code></p>
    </div>

    <div class="test-section">
        <h2>测试控制</h2>
        <button onclick="testBreakdownWS()">测试单任务 WebSocket</button>
        <button onclick="testBatchWS()">测试批量进度 WebSocket</button>
        <button onclick="clearLog()">清空日志</button>
    </div>

    <div class="test-section">
        <h2>连接状态</h2>
        <div id="status" class="status info">等待测试...</div>
    </div>

    <div class="test-section">
        <h2>日志输出</h2>
        <div id="log"></div>
    </div>

    <script>
        // 生成 UUID
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // 初始化页面信息
        const taskId = generateUUID();
        document.getElementById('currentUrl').textContent = window.location.href;
        document.getElementById('taskId').textContent = taskId;

        // 构建 WebSocket URL（模拟前端 Hook 的逻辑）
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.host;
        const wsBaseUrl = `${protocol}//${host}/api/v1/ws`;
        document.getElementById('wsUrl').textContent = wsBaseUrl;

        // 日志函数
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function setStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('日志已清空', 'info');
        }

        // 测试单任务 WebSocket
        async function testBreakdownWS() {
            const wsUrl = `${wsBaseUrl}/breakdown/${taskId}`;

            log('='.repeat(60), 'info');
            log('开始测试单任务 WebSocket', 'info');
            log(`连接地址: ${wsUrl}`, 'info');

            setStatus('正在连接...', 'info');

            try {
                const ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    log('✅ WebSocket 连接成功', 'success');
                    setStatus('已连接，等待消息...', 'success');
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        log(`📨 收到消息: ${JSON.stringify(data, null, 2)}`, 'info');

                        if (data.code === 'TASK_NOT_FOUND') {
                            log('✅ 收到预期的"任务不存在"错误', 'success');
                            log('✅ 说明 WebSocket 和数据库连接都正常', 'success');
                            setStatus('测试通过！WebSocket 功能正常', 'success');
                            setTimeout(() => ws.close(), 1000);
                        } else if (data.task_id) {
                            log(`任务状态: ${data.status}, 进度: ${data.progress}%`, 'info');
                            setStatus(`任务进行中: ${data.progress}%`, 'info');
                        }
                    } catch (err) {
                        log(`❌ 消息解析失败: ${err.message}`, 'error');
                    }
                };

                ws.onerror = (error) => {
                    log(`❌ WebSocket 错误: ${error}`, 'error');
                    setStatus('连接错误', 'error');
                };

                ws.onclose = () => {
                    log('🔌 WebSocket 连接已关闭', 'warning');
                    if (document.getElementById('status').className.includes('success')) {
                        // 保持成功状态
                    } else {
                        setStatus('连接已关闭', 'warning');
                    }
                };

            } catch (err) {
                log(`❌ 连接失败: ${err.message}`, 'error');
                setStatus('连接失败', 'error');
            }
        }

        // 测试批量进度 WebSocket
        async function testBatchWS() {
            const projectId = generateUUID();
            const wsUrl = `${wsBaseUrl}/batch-simple/${projectId}`;

            log('='.repeat(60), 'info');
            log('开始测试批量进度 WebSocket', 'info');
            log(`项目 ID: ${projectId}`, 'info');
            log(`连接地址: ${wsUrl}`, 'info');

            setStatus('正在连接批量进度 WebSocket...', 'info');

            try {
                const ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    log('✅ 批量进度 WebSocket 连接成功', 'success');
                    setStatus('批量进度已连接', 'success');
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        log(`📨 批量进度消息: ${JSON.stringify(data, null, 2)}`, 'info');

                        if (data.type === 'batch_progress') {
                            log(`总任务: ${data.total_tasks}, 进度: ${data.overall_progress}%`, 'info');
                        }
                    } catch (err) {
                        log(`❌ 消息解析失败: ${err.message}`, 'error');
                    }
                };

                ws.onerror = (error) => {
                    log(`❌ WebSocket 错误: ${error}`, 'error');
                    setStatus('批量进度连接错误', 'error');
                };

                ws.onclose = () => {
                    log('🔌 批量进度 WebSocket 已关闭', 'warning');
                };

                // 5 秒后自动关闭
                setTimeout(() => {
                    log('⏱️  测试时间到，关闭连接', 'info');
                    ws.close();
                }, 5000);

            } catch (err) {
                log(`❌ 连接失败: ${err.message}`, 'error');
                setStatus('批量进度连接失败', 'error');
            }
        }

        // 页面加载时显示欢迎信息
        window.onload = () => {
            log('🎉 WebSocket 测试页面已加载', 'success');
            log('点击上方按钮开始测试', 'info');
        };
    </script>
</body>
</html>
